# HP EliteBook 6 G1a speaker EQ — tuned via resonance-finder.py sweep
# Measured resonances: 400-630 Hz broad bump, 710-800 shoulder, 1800 Hz breakup.
# Restart PipeWire after changes: systemctl --user restart pipewire
#
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Laptop Speaker EQ"
            media.name       = "Laptop Speaker EQ"
            filter.graph = {
                nodes = [
                    {
                        # Bass harmonics boost (psychoacoustic low-end)
                        type  = builtin
                        name  = eq_bass
                        label = bq_peaking
                        control = { "Freq" = 120.0  "Q" = 1.5  "Gain" = 2.25 }
                    }
                    {
                        # Upper bass / warmth
                        type  = builtin
                        name  = eq_upperbass
                        label = bq_peaking
                        control = { "Freq" = 240.0  "Q" = 1.5  "Gain" = 1.0 }
                    }
                    {
                        # Broad midrange dip — main 400-630 Hz enclosure resonance
                        type  = builtin
                        name  = notch_midbody
                        label = bq_peaking
                        control = { "Freq" = 500.0  "Q" = 0.9  "Gain" = -10.0 }
                    }
                    {
                        # Upper shoulder — 710-900 Hz residual resonance
                        type  = builtin
                        name  = notch_shoulder
                        label = bq_peaking
                        control = { "Freq" = 760.0  "Q" = 2.5  "Gain" = -6.0 }
                    }
                    {
                        # Driver breakup mode — isolated 1.8 kHz peak
                        type  = builtin
                        name  = notch_breakup
                        label = bq_peaking
                        control = { "Freq" = 1800.0  "Q" = 4.0  "Gain" = -8.0 }
                    }
                    {
                        # Presence
                        type  = builtin
                        name  = eq_presence
                        label = bq_peaking
                        control = { "Freq" = 3800.0  "Q" = 1.5  "Gain" = 1.5 }
                    }
                    {
                        # Air / sparkle
                        type  = builtin
                        name  = eq_air
                        label = bq_peaking
                        control = { "Freq" = 7500.0  "Q" = 1.5  "Gain" = 1.0 }
                    }
                    {
                        # Ultra high
                        type  = builtin
                        name  = eq_top
                        label = bq_peaking
                        control = { "Freq" = 15000.0  "Q" = 1.5  "Gain" = 1.0 }
                    }
                ]
                links = [
                    { output = "eq_bass:Out"         input = "eq_upperbass:In" }
                    { output = "eq_upperbass:Out"    input = "notch_midbody:In" }
                    { output = "notch_midbody:Out"   input = "notch_shoulder:In" }
                    { output = "notch_shoulder:Out"  input = "notch_breakup:In" }
                    { output = "notch_breakup:Out"   input = "eq_presence:In" }
                    { output = "eq_presence:Out"     input = "eq_air:In" }
                    { output = "eq_air:Out"          input = "eq_top:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.laptop_eq"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name   = "effect_output.laptop_eq"
                node.passive = true
            }
        }
    }
]
