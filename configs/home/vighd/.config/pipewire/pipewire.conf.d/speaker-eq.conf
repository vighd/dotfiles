# HP EliteBook 6 G1a speaker EQ
# Based on Dell XPS 15 profile + 650Hz resonance notch
# Restart PipeWire after changes: systemctl --user restart pipewire
#
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Laptop Speaker EQ"
            media.name       = "Laptop Speaker EQ"
            filter.graph = {
                nodes = [
                    {
                        # Bass harmonics boost
                        type  = builtin
                        name  = eq_band_1
                        label = bq_peaking
                        control = { "Freq" = 120.0 "Q" = 1.5 "Gain" = 8.0 }
                    }
                    {
                        # Upper bass / warmth
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 240.0 "Q" = 1.5 "Gain" = 3.0 }
                    }
                    {
                        # Cut low mids - removes "boxy" laptop sound
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 480.0 "Q" = 1.5 "Gain" = -3.0 }
                    }
                    {
                        # Notch: speaker physical resonance
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 630.0 "Q" = 3.0 "Gain" = -18.0 }
                    }
                    {
                        # Cut upper mids - reduces harshness
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 960.0 "Q" = 1.5 "Gain" = 0.0 }
                    }
                    {
                        # Presence
                        type  = builtin
                        name  = eq_band_6
                        label = bq_peaking
                        control = { "Freq" = 2000.0 "Q" = 1.5 "Gain" = 0.0 }
                    }
                    {
                        # Brilliance / detail
                        type  = builtin
                        name  = eq_band_7
                        label = bq_peaking
                        control = { "Freq" = 3800.0 "Q" = 1.5 "Gain" = 1.5 }
                    }
                    {
                        # Air / sparkle
                        type  = builtin
                        name  = eq_band_8
                        label = bq_peaking
                        control = { "Freq" = 7500.0 "Q" = 1.5 "Gain" = 1.0 }
                    }
                    {
                        # Ultra high - presence
                        type  = builtin
                        name  = eq_band_9
                        label = bq_peaking
                        control = { "Freq" = 15000.0 "Q" = 1.5 "Gain" = 1.0 }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                    { output = "eq_band_6:Out" input = "eq_band_7:In" }
                    { output = "eq_band_7:Out" input = "eq_band_8:In" }
                    { output = "eq_band_8:Out" input = "eq_band_9:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.laptop_eq"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name   = "effect_output.laptop_eq"
                node.passive = true
            }
        }
    }
]
